<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tower Token Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #0f1220, #1e2140);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 1000px;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: clamp(26px, 5vw, 36px);
      color: #ffd86b;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
    }
    p {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 20px;
      font-size: clamp(14px, 2.5vw, 16px);
    }
    button {
      display: block;
      margin: 0 auto 24px;
      padding: 12px 22px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      background: #ffd86b;
      color: #1a1a1a;
      box-shadow: 0 5px 15px rgba(0,0,0,0.25);
      transition: all 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      width: 100%;
    }
    .tower {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
      transition: all 0.2s ease;
    }
    .tower:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
    }
    .name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .range {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 4px;
    }
    .token {
      font-size: 20px;
      font-weight: 800;
      color: #ffd86b;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tower Token Generator</h1>
    <p>Random values are generated every time you press regenerate.</p>
    <button id="regen">Regenerate</button>
    <div id="list" class="grid"></div>
  </div>

  <script>
    const towers = [
      { name: "Aviator", min: 3, max: 6 },
      { name: "Barracks", min: 1, max: 4 },
      { name: "Commander", min: 7, max: 10 },
      { name: "Cryo-Gunner", min: 5, max: 8 },
      { name: "DJ", min: 5, max: 8 },
      { name: "Flamethrower", min: 5, max: 8 },
      { name: "Fragger", min: 7, max: 10 },
      { name: "Golden Commando", min: 1, max: 4 },
      { name: "Golden Scout", min: 7, max: 10 },
      { name: "Graveyard", min: 1, max: 4 },
      { name: "Hallowboomer", min: 5, max: 8 },
      { name: "Marksman", min: 5, max: 8 },
      { name: "Mercenary", min: 5, max: 8 },
      { name: "Mortar", min: 7, max: 10 },
      { name: "Patrol", min: 3, max: 6 },
      { name: "Phaser", min: 3, max: 6 },
      { name: "Railgunner", min: 1, max: 4 },
      { name: "Scout", min: 1, max: 4 },
      { name: "Shotgunner", min: 7, max: 10 },
      { name: "Sniper", min: 1, max: 4 },
      { name: "Soldier", min: 5, max: 8 },
      { name: "Tuber", min: 3, max: 6 },
      { name: "Zed", min: 1, max: 4 }
    ].sort((a, b) => a.name.localeCompare(b.name));

    const container = document.getElementById("list");
    const button = document.getElementById("regen");

    function generate() {
      container.innerHTML = "";
      towers.forEach((tower) => {
        const value = Math.floor(Math.random() * (tower.max - tower.min + 1)) + tower.min;
        const el = document.createElement("div");
        el.className = "tower";
        el.innerHTML = `
          <div>
            <div class="name">${tower.name}</div>
            <div class="range">Range: ${tower.min}–${tower.max}</div>
          </div>
          <div class="token">${value} Token</div>
        `;
        container.appendChild(el);
      });
    }

    button.addEventListener("click", generate);
    generate();
  </script>
</body>
</html>
