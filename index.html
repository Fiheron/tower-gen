<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tower Token Generator</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #0f1220, #181c3a);
      color: #ffffff;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: clamp(22px, 4vw, 32px);
    }
    p {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 12px;
      font-size: clamp(14px, 2.5vw, 16px);
    }
    button {
      display: block;
      margin: 0 auto 24px;
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: #ffd86b;
      color: #1a1a1a;
    }
    button:hover {
      opacity: 0.9;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .tower {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(6px);
      padding: 14px 16px;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .name {
      font-size: 15px;
      font-weight: 600;
    }
    .range {
      font-size: 12px;
      opacity: 0.6;
    }
    .token {
      font-size: 18px;
      font-weight: 700;
      color: #ffd86b;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tower Token Generator</h1>
    <p>Random values are generated every time you press regenerate.</p>
    <button id="regen">Regenerate</button>
    <div id="list" class="grid"></div>
  </div>

  <script>
    
    const towers = [
      { name: "Barracks", min: 1, max: 5 },
      { name: "Golden Commando", min: 1, max: 5 },
      { name: "Graveyard", min: 1, max: 5 },
      { name: "Railgunner", min: 1, max: 5 },
      { name: "Scout", min: 1, max: 5 },
      { name: "Sniper", min: 1, max: 5 },
      { name: "Zed", min: 1, max: 5 },

      { name: "Aviator", min: 3, max: 7 },
      { name: "Patrol", min: 3, max: 7 },
      { name: "Phaser", min: 3, max: 7 },
      { name: "Tuber", min: 3, max: 7 },

      { name: "Cryo-Gunner", min: 5, max: 10 },
      { name: "DJ", min: 5, max: 10 },
      { name: "Flamethrower", min: 5, max: 10 },
      { name: "Hallowboomer", min: 5, max: 10 },
      { name: "Marksman", min: 5, max: 10 },
      { name: "Mercenary", min: 5, max: 10 },
      { name: "Soldier", min: 5, max: 10 },

      { name: "Commander", min: 7, max: 10 },
      { name: "Fragger", min: 7, max: 10 },
      { name: "Golden Scout", min: 7, max: 10 },
      { name: "Mortar", min: 7, max: 10 },
      { name: "Shotgunner", min: 7, max: 10 }
    ].sort((a, b) => a.name.localeCompare(b.name));

    const container = document.getElementById("list");
    const button = document.getElementById("regen");

    function generate() {
      container.innerHTML = "";
      towers.forEach((tower) => {
        const value = Math.floor(Math.random() * (tower.max - tower.min + 1)) + tower.min;

        const el = document.createElement("div");
        el.className = "tower";
        el.innerHTML = `
          <div>
            <div class="name">${tower.name}</div>
            <div class="range">Range: ${tower.min}–${tower.max}</div>
          </div>
          <div class="token">${value} Token</div>
        `;
        container.appendChild(el);
      });
    }

    button.addEventListener("click", generate);
    generate();
